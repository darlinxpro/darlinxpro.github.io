<!DOCTYPE html>
<html lang="en">
<head>
  <title>ID Lookup</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9960960521995693"
     crossorigin="anonymous"></script>
  <style>
    body {
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
      min-height: 100vh;
      color: #e0e0e0;
      padding-bottom: 80px;
    }

    .container {
      background: rgba(0, 16, 51, 0.8);
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    h2 {
      color: #ccba7a;
      text-shadow: 0 0 10px rgba(204, 187, 122, 0.3);
    }

    .table {
      background: rgba(0, 16, 51, 0.6);
      border-radius: 8px;
      overflow: hidden;
    }

    .table-bordered th,
    .table-bordered td {
      border-color: #0072f5 !important;
      color: #e0e0e0;
    }

    .table td:first-child {
      color: #339af0;
      font-weight: 500;
    }

    .table thead th {
      background: linear-gradient(180deg, #001033 0%, #002552 100%);
      color: #ccba7a;
      border-bottom: 2px solid #0072f5;
    }

    .table tbody tr {
      transition: all 0.2s;
    }

    .table tbody tr:hover {
      background: rgba(0, 115, 245, 0.15);
    }

    .btn-primary {
      background: linear-gradient(180deg, #0072f5 0%, #0056b3 100%);
      border: none;
      padding: 5px 15px;
      border-radius: 4px;
    }

    .btn-primary:hover {
      background: linear-gradient(180deg, #339af0 0%, #0072f5 100%);
    }

    .form-control {
      background: rgba(0, 16, 51, 0.8);
      border: 1px solid #0072f5;
      color: #fff;
    }

    .form-control:focus {
      background: rgba(0, 16, 51, 1);
      border-color: #339af0;
      box-shadow: 0 0 10px rgba(51, 154, 240, 0.3);
      color: #fff;
    }

    .form-control::placeholder {
      color: #868e96;
    }

    footer {
      background: linear-gradient(180deg, #001033 0%, #000814 100%);
    }

    .progress {
      display: none;
      margin-top: 10px;
    }

    .loading {
      text-align: center;
      padding: 10px;
      font-weight: bold;
    }

    body {
      padding-bottom: 80px;
    }

    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      background-color: #333;
      color: white;
      text-align: center;
      padding: 10px;
      font-size: 14px;
    }

    label {
      color: #ccba7a;
    }

    .btn-success {
      background: linear-gradient(180deg, #28a745 0%, #1e7e34 100%);
      border: none;
    }

    .btn-success:hover {
      background: linear-gradient(180deg, #51cf66 0%, #28a745 100%);
    }

    .copy-confirmation {
      display: table-row;
      width: 100%;
      padding: 10px;
      background-color: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
      text-align: center;
    }

    .commander-link {
      color: #339af0;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }

    .commander-link:hover {
      color: #74c0fc;
      text-shadow: 0 0 10px rgba(51, 154, 240, 0.5);
    }

    .commander-modal .modal-content {
      background: linear-gradient(180deg, #001033 0%, #002552 100%);
      border: 2px solid #0072f5;
      border-radius: 12px;
    }

    .commander-modal .modal-body {
      background-color: transparent;
      color: white;
    }

    .commander-modal .modal-lg {
      max-width: 800px;
    }

    .commander-modal .modal-header {
      background: linear-gradient(180deg, #000814 0%, #001033 100%);
      color: #ccba7a;
      border-bottom: 2px solid #0072f5;
      border-radius: 10px 10px 0 0;
    }

    .commander-modal .close {
      color: #fff;
      opacity: 0.8;
    }

    .commander-modal .close:hover {
      opacity: 1;
      color: #339af0;
    }

    .stat-bar {
      height: 20px;
      background-color: #001033;
      border-radius: 4px;
      margin: 2px 0;
    }

    .stat-fill {
      height: 100%;
      background-color: #0072f5;
      border-radius: 4px;
    }

    .commander-modal .table-dark {
      background-color: #001033;
    }

    .commander-modal .table-dark th,
    .commander-modal .table-dark td {
      border-color: #0072f5;
    }

    .commander-bg {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-size: cover;
      background-position: center;
      opacity: 0.15;
      z-index: 0;
      border-radius: 8px;
    }

    .commander-modal .modal-body {
      position: relative;
      overflow: hidden;
    }

    .prof-box:hover {
      background: rgba(0,115,245,0.4) !important;
      transform: scale(1.05);
      transition: all 0.2s;
    }

    .tooltip .tooltip-inner {
      background-color: #001033;
      color: #fff;
      border: 1px solid #0072f5;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type="number"] {
      -moz-appearance: textfield;
    }

    .footer-link {
      color: #fff;
      text-decoration: none;
    }

    .footer-link:hover {
      color: #ccc;
    }

    .main-layout {
      display: flex;
      gap: 10px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .main-content {
      flex: 1;
      max-width: 800px;
    }

    .sidebar-ad {
      width: 160px;
      min-height: 600px;
      display: flex;
      align-items: flex-start;
    }

    .top-ad {
      margin-bottom: 15px;
      text-align: center;
      min-height: 90px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>
<body>

  <div class="main-layout">
    <!-- Left Ad -->
    <div class="sidebar-ad">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-9960960521995693"
           data-ad-slot="1234567890"></ins>
    </div>

    <div class="main-content container mt-3">
      <h2>ID Lookup</h2>
      
      <!-- Top Ad (Banner) -->
      <div class="top-ad">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-9960960521995693"
             data-ad-slot="9876543210"
             data-ad-format="horizontal"></ins>
      </div>

      <p>Type in the box to search by ID, Name or Star (e.g., R8 for 8★):</p>
      <input class="form-control" id="myInput" type="text" placeholder="Search.. (R1-R9 for stars)">
      <br>

      <div class="form-inline">
        <label for="playerId">Player ID:</label>
        <input class="form-control ml-2" id="playerId" type="number" placeholder="Player ID">
        <button class="btn btn-success ml-2" id="toggleButton" onclick="togglePlayerId()">Confirmar</button>
      </div>
      <br>

      <table class="table table-bordered">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="myTable"></tbody>
    </table>

    <div id="loadingMessage" class="loading" style="display: none;">
      Cargando más datos...
    </div>
    </div>

    <!-- Right Ad -->
    <div class="sidebar-ad">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-9960960521995693"
           data-ad-slot="1234567891"></ins>
    </div>
  </div>

  <script>
    let data = []; 
    let commanders = {};
    let visibleCount = 0;
    let rowsPerLoad = Math.floor(window.innerHeight / 50);

    Promise.all([
      fetch('id.txt').then(r => r.text()),
      fetch('commanders.json').then(r => r.json())
    ]).then(([idText, cmdJson]) => {
      commanders = cmdJson;
      data = idText.split('\n').filter(line => line.includes('=')).map(line => {
        const [id, name] = line.split('=');
        return { id: id.trim(), name: name.trim() };
      });
      console.log('Loaded', data.length, 'items');
      console.log('Commanders:', Object.keys(commanders));
      loadMoreData();
    }).catch(err => {
      console.error('Error loading data:', err);
    });

    function loadMoreData() {
      const tbody = document.getElementById("myTable");
      const end = visibleCount + rowsPerLoad;

      for (let i = visibleCount; i < end && i < data.length; i++) {
        const { id, name } = data[i];
        const baseName = name.replace(/\s+\d+★$/, '');
        const key = baseName.replace(/ /g, '_');
        const scrollKey = name.replace(/\s*\(Scroll\)\s*$/, ' Scroll');
        const commanderInfo = commanders[baseName];
        const scrollChestInfo = commanders[key] || commanders[baseName];
        const divineScrollInfo = commanders[scrollKey];
        const isScrollChest = scrollChestInfo && scrollChestInfo.type === "Scroll Chest";
        const isDivineScroll = divineScrollInfo && divineScrollInfo.type === "Divine Scroll";
        const hasInfo = commanderInfo || scrollChestInfo || divineScrollInfo;
        const tr = document.createElement('tr');
        if (isDivineScroll) {
          tr.innerHTML = `
            <td>${id}</td>
            <td>${divineScrollInfo ? `<span class="commander-link" onclick="showDivineScroll('${scrollKey}')">${name}</span>` : name}</td>
            <td><button class="btn btn-primary" onclick="copyToClipboard('${id}', this)">Copiar</button></td>
          `;
        } else if (isScrollChest) {
          tr.innerHTML = `
            <td>${id}</td>
            <td>${scrollChestInfo ? `<span class="commander-link" onclick="showScrollChest('${baseName}', '${name}')">${name}</span>` : name}</td>
            <td><button class="btn btn-primary" onclick="copyToClipboard('${id}', this)">Copiar</button></td>
          `;
        } else {
          tr.innerHTML = `
            <td>${id}</td>
            <td>${commanderInfo ? `<span class="commander-link" onclick="showCommander('${baseName}', '${name}')">${name}</span>` : name}</td>
            <td><button class="btn btn-primary" onclick="copyToClipboard('${id}', this)">Copiar</button></td>
          `;
        }
        tbody.appendChild(tr);
      }
      visibleCount = end;
    }

    window.addEventListener("scroll", () => {
      const scrollPosition = window.innerHeight + window.scrollY;
      const documentHeight = document.body.offsetHeight;

      if (scrollPosition >= documentHeight - 100) {
        document.getElementById("loadingMessage").style.display = "block";
        setTimeout(() => {
          loadMoreData();
          document.getElementById("loadingMessage").style.display = "none";
        }, 1000);
      }
    });

    function filterData() {
      const value = document.getElementById("myInput").value.toLowerCase();
      const tbody = document.getElementById("myTable");
      tbody.innerHTML = ""; 

      let filteredData = data;

      const starMatch = value.match(/^r(\d+)$/);
      if (starMatch) {
        const starNum = starMatch[1];
        filteredData = data.filter(item => item.name.includes(starNum + "★"));
      } else if (value.includes(" r")) {
        const parts = value.split(" r");
        const namePart = parts[0].trim();
        const starPart = parts[1].match(/^(\d+)$/);
        if (starPart) {
          filteredData = data.filter(item => 
            item.name.toLowerCase().includes(namePart) && 
            item.name.includes(starPart[1] + "★")
          );
        }
      } else {
        filteredData = data.filter(item => item.id.includes(value) || item.name.toLowerCase().includes(value));
      }

      filteredData.forEach(({ id, name }) => {
        const baseName = name.replace(/\s+\d+★$/, '');
        const key = baseName.replace(/ /g, '_');
        const scrollKey = name.replace(/\s*\(Scroll\)\s*$/, ' Scroll');
        const commanderInfo = commanders[baseName];
        const scrollChestInfo = commanders[key] || commanders[baseName];
        const divineScrollInfo = commanders[scrollKey];
        const isScrollChest = scrollChestInfo && scrollChestInfo.type === "Scroll Chest";
        const isDivineScroll = divineScrollInfo && divineScrollInfo.type === "Divine Scroll";
        const hasInfo = commanderInfo || scrollChestInfo || divineScrollInfo;
        const tr = document.createElement('tr');
        if (isDivineScroll) {
          tr.innerHTML = `
            <td>${id}</td>
            <td>${divineScrollInfo ? `<span class="commander-link" onclick="showDivineScroll('${scrollKey}')">${name}</span>` : name}</td>
            <td><button class="btn btn-primary" onclick="copyToClipboard('${id}', this)">Copiar</button></td>
          `;
        } else if (isScrollChest) {
          tr.innerHTML = `
            <td>${id}</td>
            <td>${scrollChestInfo ? `<span class="commander-link" onclick="showScrollChest('${baseName}', '${name}')">${name}</span>` : name}</td>
            <td><button class="btn btn-primary" onclick="copyToClipboard('${id}', this)">Copiar</button></td>
          `;
        } else {
          tr.innerHTML = `
            <td>${id}</td>
            <td>${commanderInfo ? `<span class="commander-link" onclick="showCommander('${baseName}', '${name}')">${name}</span>` : name}</td>
            <td><button class="btn btn-primary" onclick="copyToClipboard('${id}', this)">Copiar</button></td>
          `;
        }
        tbody.appendChild(tr);
      });
    }

    document.getElementById("myInput").addEventListener("input", filterData);

    function showCommander(name, fullName) {
      // Extract star level from full name
      const starMatch = fullName.match(/(\d+)★/);
      const starLevel = starMatch ? parseInt(starMatch[1]) : 1;

      const cmd = commanders[name];
      if (!cmd) return;

      const prof = cmd.prof || {};
      const command = cmd.command || {};
      const profColors = {'S': '#ff6b6b', 'A': '#51cf66', 'B': '#339af0', 'C': '#fcc419', 'D': '#868e96'};
      
      // Damage percentages for weapons (ballistic, directional, missile, carrier, defend)
      const weaponDmg = {'S': '+30%', 'A': '+10%', 'B': '0%', 'C': '-10%', 'D': '-30%'};
      // Damage percentages for ships (frigate, cruiser, battleship)
      const shipDmg = {'S': '-30%', 'A': '-10%', 'B': '0%', 'C': '+10%', 'D': '+30%'};
      
      // Image paths for proficiency
      const profImages = {
        ballistic: 'https://krtools.info/imgs/layout/effBallistic.png',
        directional: 'https://krtools.info/imgs/layout/effDirectional.png',
        missile: 'https://krtools.info/imgs/layout/effMissile.png',
        carrier: 'https://krtools.info/imgs/layout/effShipBased.png',
        defend: 'https://krtools.info/imgs/layout/effPlanetary.png',
        frigate: 'https://krtools.info/imgs/layout/effFrigate.png',
        cruiser: 'https://krtools.info/imgs/layout/effCruiser.png',
        battleship: 'https://krtools.info/imgs/layout/effBattleship.png'
      };
      
      document.getElementById('commanderTitle').textContent = name + ' - ' + cmd.type;
      
      // Build command table - only show the star level being viewed
      const c = command[starLevel.toString()] || {frigate: '-', cruiser: '-', battleship: '-'};
      const commandRow = '<tr><td>' + starLevel + '★</td><td>' + c.frigate + '</td><td>' + c.cruiser + '</td><td>' + c.battleship + '</td></tr>';
      
      document.getElementById('commanderBody').innerHTML = 
        // Imagen + Skill en fila
        '<div class="commander-bg" style="background-image: url(\'' + cmd.image + '\');"></div>' +
        '<div class="row mb-4">' +
          '<div class="col-md-4 text-center">' +
            '<img src="' + cmd.image + '" alt="' + name + '" style="max-width: 160px; border: 3px solid #0072f5; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">' +
            '<h5 class="mt-2" style="color: #ccba7a;">' + cmd.type + ' Commander</h5>' +
          '</div>' +
          '<div class="col-md-8">' +
            '<h6 class="border-bottom border-secondary pb-2 mb-2" style="color: #ccba7a;"><strong>⚡ Skill</strong></h6>' +
            '<h5 class="mb-2">' + cmd.skill + '</h5>' +
            '<p class="mb-0 text-light" style="font-size: 14px;">' + cmd.skillDesc + '</p>' +
          '</div>' +
        '</div>' +
        
        // Stats + Proficiency + Ship Power en fila
        '<div class="row mb-2">' +
          '<div class="col-md-6">' +
            '<h6 class="border-bottom border-secondary pb-2 mb-2" style="color: #ccba7a;"><strong>📊 Base Stats</strong></h6>' +
            '<div class="mb-2"><div><strong>Accuracy: ' + cmd.stats.accuracy + '</strong></div><div class="stat-bar"><div class="stat-fill" style="width: ' + Math.min(cmd.stats.accuracy * 2, 100) + '%; background: linear-gradient(90deg, #dc3545, #ff6b6b);"></div></div></div>' +
            '<div class="mb-2"><div><strong>Speed: ' + cmd.stats.speed + '</strong></div><div class="stat-bar"><div class="stat-fill" style="width: ' + Math.min(cmd.stats.speed * 2, 100) + '%; background: linear-gradient(90deg, #28a745, #20c997);"></div></div></div>' +
            '<div class="mb-2"><div><strong>Dodge: ' + cmd.stats.dodge + '</strong></div><div class="stat-bar"><div class="stat-fill" style="width: ' + Math.min(cmd.stats.dodge * 2, 100) + '%; background: linear-gradient(90deg, #0072f5, #00d4ff);"></div></div></div>' +
            '<div class="mb-2"><div><strong>Electron: ' + cmd.stats.electron + '</strong></div><div class="stat-bar"><div class="stat-fill" style="width: ' + Math.min(cmd.stats.electron * 2, 100) + '%; background: linear-gradient(90deg, #6c757d, #adb5bd);"></div></div></div>' +
          '</div>' +
          '<div class="col-md-6">' +
            '<h6 class="border-bottom border-secondary pb-2 mb-2" style="color: #ccba7a;"><strong>🎯 Proficiency</strong></h6>' +
            '<div class="row text-center">' +
              '<div class="col-3 mb-1"><div class="prof-box" data-toggle="tooltip" data-placement="top" title="Damage: ' + (weaponDmg[prof.ballistic] || '0%') + '" style="background: rgba(0,0,0,0.3); padding: 4px; border-radius: 4px; cursor: help;"><img src="' + profImages.ballistic + '" style="width: 24px; height: 24px;"><br><span style="color: ' + (profColors[prof.ballistic] || '#fff') + '; font-size: 12px; font-weight: bold;">' + (prof.ballistic || '-') + '</span></div></div>' +
              '<div class="col-3 mb-1"><div class="prof-box" data-toggle="tooltip" data-placement="top" title="Damage: ' + (weaponDmg[prof.directional] || '0%') + '" style="background: rgba(0,0,0,0.3); padding: 4px; border-radius: 4px; cursor: help;"><img src="' + profImages.directional + '" style="width: 24px; height: 24px;"><br><span style="color: ' + (profColors[prof.directional] || '#fff') + '; font-size: 12px; font-weight: bold;">' + (prof.directional || '-') + '</span></div></div>' +
              '<div class="col-3 mb-1"><div class="prof-box" data-toggle="tooltip" data-placement="top" title="Damage: ' + (weaponDmg[prof.missile] || '0%') + '" style="background: rgba(0,0,0,0.3); padding: 4px; border-radius: 4px; cursor: help;"><img src="' + profImages.missile + '" style="width: 24px; height: 24px;"><br><span style="color: ' + (profColors[prof.missile] || '#fff') + '; font-size: 12px; font-weight: bold;">' + (prof.missile || '-') + '</span></div></div>' +
              '<div class="col-3 mb-1"><div class="prof-box" data-toggle="tooltip" data-placement="top" title="Damage: ' + (weaponDmg[prof.carrier] || '0%') + '" style="background: rgba(0,0,0,0.3); padding: 4px; border-radius: 4px; cursor: help;"><img src="' + profImages.carrier + '" style="width: 24px; height: 24px;"><br><span style="color: ' + (profColors[prof.carrier] || '#fff') + '; font-size: 12px; font-weight: bold;">' + (prof.carrier || '-') + '</span></div></div>' +
              '<div class="col-3 mb-1"><div class="prof-box" data-toggle="tooltip" data-placement="top" title="Damage: ' + (weaponDmg[prof.defend] || '0%') + '" style="background: rgba(0,0,0,0.3); padding: 4px; border-radius: 4px; cursor: help;"><img src="' + profImages.defend + '" style="width: 24px; height: 24px;"><br><span style="color: ' + (profColors[prof.defend] || '#fff') + '; font-size: 12px; font-weight: bold;">' + (prof.defend || '-') + '</span></div></div>' +
              '<div class="col-3 mb-1"><div class="prof-box" data-toggle="tooltip" data-placement="top" title="Damage: ' + (shipDmg[prof.frigate] || '0%') + '" style="background: rgba(0,0,0,0.3); padding: 4px; border-radius: 4px; cursor: help;"><img src="' + profImages.frigate + '" style="width: 24px; height: 24px;"><br><span style="color: ' + (profColors[prof.frigate] || '#fff') + '; font-size: 12px; font-weight: bold;">' + (prof.frigate || '-') + '</span></div></div>' +
              '<div class="col-3 mb-1"><div class="prof-box" data-toggle="tooltip" data-placement="top" title="Damage: ' + (shipDmg[prof.cruiser] || '0%') + '" style="background: rgba(0,0,0,0.3); padding: 4px; border-radius: 4px; cursor: help;"><img src="' + profImages.cruiser + '" style="width: 24px; height: 24px;"><br><span style="color: ' + (profColors[prof.cruiser] || '#fff') + '; font-size: 12px; font-weight: bold;">' + (prof.cruiser || '-') + '</span></div></div>' +
              '<div class="col-3 mb-1"><div class="prof-box" data-toggle="tooltip" data-placement="top" title="Damage: ' + (shipDmg[prof.battleship] || '0%') + '" style="background: rgba(0,0,0,0.3); padding: 4px; border-radius: 4px; cursor: help;"><img src="' + profImages.battleship + '" style="width: 24px; height: 24px;"><br><span style="color: ' + (profColors[prof.battleship] || '#fff') + '; font-size: 12px; font-weight: bold;">' + (prof.battleship || '-') + '</span></div></div>' +
            '</div>' +
            '<h6 class="border-bottom border-secondary pb-1 mb-1 mt-2" style="color: #ccba7a; font-size: 12px;"><strong>🚀 Ship Power (' + starLevel + '★)</strong></h6>' +
            '<div class="row text-center">' +
              '<div class="col-4"><div style="background: rgba(0,0,0,0.3); padding: 4px; border-radius: 4px;"><img src="https://krtools.info/imgs/layout/effFrigate.png" style="width: 20px; height: 20px;"><br><strong style="color: #339af0; font-size: 12px;">' + c.frigate + '</strong></div></div>' +

    function showDivineScroll(name) {
      const scroll = commanders[name];
      if (!scroll) return;

      let commandersHtml = '';
      if (scroll.commanders && scroll.commanders.length > 0) {
        commandersHtml = '<div class="row text-center">';
        scroll.commanders.forEach(cmd => {
          commandersHtml += `
            <div class="col-6 mb-2">
              <div style="background: rgba(0,0,0,0.3); padding: 8px; border-radius: 4px;">
                <span style="color: #339af0; font-size: 14px;">${cmd}</span>
              </div>
            </div>
          `;
        });
        commandersHtml += '</div>';
      } else {
        commandersHtml = '<p style="color: #fff;">Recipe unknown</p>';
      }

      document.getElementById('commanderTitle').textContent = name;
      
      document.getElementById('commanderBody').innerHTML = 
        '<div class="row mb-4">' +
          '<div class="col-md-4 text-center">' +
            `<img src="${scroll.image}" alt="${name}" style="max-width: 160px; border: 3px solid #ffd43b; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">` +
            `<h5 class="mt-2" style="color: #ffd43b;">${scroll.type}</h5>` +
          '</div>' +
          '<div class="col-md-8">' +
            `<h6 class="border-bottom border-secondary pb-2 mb-2" style="color: #ccba7a;"><strong>📍 Location</strong></h6>` +
            `<p class="mb-3" style="color: #fff;">${scroll.location || 'Unknown'}</p>` +
            `<h6 class="border-bottom border-secondary pb-2 mb-2" style="color: #ccba7a;"><strong>🔧 Required Commanders</strong></h6>` +
            commandersHtml +
          '</div>' +
        '</div>';
      
      $('#commanderModal').modal('show');
    }

    function togglePlayerId() {
      const playerIdInput = document.getElementById("playerId");
      const toggleButton = document.getElementById("toggleButton");

      playerIdInput.disabled = !playerIdInput.disabled;
      toggleButton.textContent = playerIdInput.disabled ? "Desbloquear" : "Confirmar";
    }

    function copyToClipboard(id, button) {
      const playerId = document.getElementById("playerId").value;
      if (!playerId) {
        alert("Por favor ingresa un Player ID antes de copiar.");
        return;
      }

      const finalValue = `/senditem ${playerId} ${id} 1`;
      const tempInput = document.createElement("input");
      document.body.appendChild(tempInput);
      tempInput.value = finalValue;
      tempInput.select();
      document.execCommand("copy");
      document.body.removeChild(tempInput);

      const row = button.parentElement.parentElement;

      const confirmationRow = document.createElement("tr");
      confirmationRow.className = "copy-confirmation";
      confirmationRow.innerHTML = `
        <td colspan="3"><strong>Copiado:</strong> ${finalValue}
          <div class="progress mt-2">
            <div class="progress-bar progress-bar-success progress-bar-striped" role="progressbar"
              aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" style="width: 0%;">
            </div>
          </div>
        </td>
      `;

      row.after(confirmationRow);

      const progressBar = confirmationRow.querySelector(".progress-bar");
      let width = 0;
      const interval = setInterval(() => {
        width += 1;
        progressBar.style.width = width + "%";
        progressBar.setAttribute("aria-valuenow", width);

        if (width >= 100) {
          clearInterval(interval);
          setTimeout(() => {
            confirmationRow.remove();
          }, 500);
        }
      }, 30);
    }
